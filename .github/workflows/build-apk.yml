name: Build VLC Pro APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Setup Java 17 (Stable with Cordova)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install Cordova
      run: npm install -g cordova
        
    - name: Create Cordova Project
      run: cordova create build com.vlcpro.translator "VLC Pro Translator"
        
    - name: Add Android Platform
      working-directory: ./build
      run: cordova platform add android@11.0.0
        
    - name: Install Plugins
      working-directory: ./build
      run: |
        cordova plugin add cordova-plugin-whitelist
        cordova plugin add cordova-plugin-media
        cordova plugin add cordova-plugin-file
        cordova plugin add cordova-plugin-permission
        
    - name: Copy Source Files
      run: |
        cp www/index.html build/www/
        cp config.xml build/
        cp icon.png build/www/ 2>/dev/null || echo "No icon"
        
    - name: Build Debug APK
      working-directory: ./build
      run: cordova build android --debug
        
    - name: Build Release APK
      working-directory: ./build
      run: cordova build android --release
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VLC-Pro-Debug-APK
        path: build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: VLC-Pro-Release-APK
        path: build/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
        
