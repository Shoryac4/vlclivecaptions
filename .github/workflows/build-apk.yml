name: Build VLC Pro APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Install Cordova
      run: |
        npm install -g cordova
        
    - name: Create Cordova Project
      run: |
        cordova create build com.vlcpro.translator "VLC Pro Translator" --template ./
        
    - name: Add Android Platform
      run: |
        cd build
        cordova platform add android@12.0.0
        
    - name: Install Plugins
      run: |
        cd build
        cordova plugin add cordova-plugin-whitelist
        cordova plugin add cordova-plugin-media
        cordova plugin add cordova-plugin-file
        cordova plugin add cordova-plugin-permission
        
    - name: Copy Source Files
      run: |
        cp www/index.html build/www/
        cp config.xml build/
        cp icon.png build/www/ 2>/dev/null || echo "No custom icon found"
        
    - name: Build Debug APK
      run: |
        cd build
        cordova build android --debug
        
    - name: Build Release APK (Unsigned)
      run: |
        cd build
        cordova build android --release
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: VLC-Pro-Debug-APK
        path: build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: VLC-Pro-Release-APK
        path: build/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30
        
    - name: Create Release
      if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          build/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
